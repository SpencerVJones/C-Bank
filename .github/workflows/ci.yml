name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 9.0.x
  BUILD_CONFIGURATION: Release
  SOLUTION_FILE: ConsoleATM.sln
  TEST_PROJECT: tests/AtmMachine.Tests/AtmMachine.Tests.csproj

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore $SOLUTION_FILE

      - name: Build
        run: dotnet build $SOLUTION_FILE --configuration $BUILD_CONFIGURATION --no-restore

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore $TEST_PROJECT

      - name: Run tests
        run: >
          dotnet test $TEST_PROJECT
          --configuration $BUILD_CONFIGURATION
          --no-restore
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=test-results.trx"
          --results-directory artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/test-results
          if-no-files-found: warn

  lint-format:
    name: Lint / Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore $SOLUTION_FILE

      - name: Verify formatting
        run: dotnet format $SOLUTION_FILE --verify-no-changes --no-restore --verbosity normal
